<div class="ion-page">
  <header class="ion-header">
    <div class="ion-toolbar">
      <h1 class="ion-title">{{ isEdit() ? 'Editar Equipamento' : 'Novo Equipamento' }}</h1>
      <div class="ion-buttons" slot="end">
        <ion-button type="button" (click)="cancel()">
          <ion-icon type="close-outline"></ion-icon>
          Cancelar
        </ion-button>
      </div>
    </div>
  </header>

  <main class="ion-content">
    @if (loading()) {
      <ion-spinner></ion-spinner>
      <p>Carregando...</p>
    } @else {
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="ion-item">
          <ion-icon type="document-outline" slot="start"></ion-icon>
          <ion-input formControlName="name" placeholder="Nome" required></ion-input>
        </div>

        <div class="ion-item">
          <ion-icon type="folder-outline" slot="start"></ion-icon>
          <ion-select formControlName="category" placeholder="Categoria">
            @for (cat of categories; track cat) {
              <ion-select-option [value]="cat">{{ cat }}</ion-select-option>
            }
          </ion-select>
        </div>

        <div class="ion-item">
          <ion-icon type="hardware-chip-outline" slot="start"></ion-icon>
          <ion-input formControlName="type" placeholder="Tipo" required></ion-input>
        </div>

        <div class="ion-item">
          <ion-icon type="wifi-outline" slot="start"></ion-icon>
          <ion-input formControlName="sn_mac" placeholder="SN/MAC" required></ion-input>
        </div>

        <div class="ion-item">
          <ion-icon type="checkmark-circle-outline" slot="start"></ion-icon>
          <ion-select formControlName="status" placeholder="Status">
            @for (stat of statuses; track stat) {
              <ion-select-option [value]="stat">{{ stat }}</ion-select-option>
            }
          </ion-select>
        </div>

        <div class="ion-item">
          <ion-icon type="link-outline" slot="start"></ion-icon>
          <ion-input formControlName="heritage" placeholder="Herança"></ion-input>
        </div>

        <div class="ion-item">
          <ion-icon type="cash-outline" slot="start"></ion-icon>
          <ion-input formControlName="price" type="number" placeholder="Preço" required></ion-input>
        </div>

        <div class="ion-item">
          <ion-icon type="cube-outline" slot="start"></ion-icon>
          <ion-input formControlName="stock" type="number" placeholder="Estoque" required></ion-input>
        </div>

        <ion-button type="submit" [disabled]="!form.valid || loading()">
          <ion-icon type="save-outline"></ion-icon>
          Salvar
        </ion-button>
      </form>
    }
  </main>
</div>
